# Ansible Playbook開始
# EC2へMySQL Serverをインストールする処理

- name: Install MySQL Server

  # 対象ホストグループ
  # inventory.ini の [web] に対応
  hosts: web

  # root権限で実行
  become: yes

  # 実行タスク一覧
  tasks:

    # MySQL公式リポジトリを追加
    # Amazon Linux標準リポジトリに無いバージョンを利用するため
    - name: Add MySQL repo

      # dnfモジュールを使用
      ansible.builtin.dnf:

        # RPMリポジトリURL
        # MySQL公式のyum/dnfリポジトリを追加
        name: https://repo.mysql.com/mysql80-community-release-el9.rpm

        # パッケージが無ければ追加
        state: present

        # GPG署名チェックを無効化
        # 学習用途や簡易環境で利用されることが多い
        disable_gpg_check: yes

    # MySQL Server本体をインストール
    - name: Install MySQL server

      # OS標準パッケージ管理を使用
      ansible.builtin.package:

        # インストール対象パッケージ
        name: mysql-community-server

        # 未インストールなら導入
        state: present