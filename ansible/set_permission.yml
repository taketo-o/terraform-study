# Ansible Playbook開始
# Spring Bootプロジェクトのgradlewに実行権限を付与する

- name: Set permission for gradlew

  # 対象ホストグループ
  # inventory.ini の [web] に対応
  hosts: web

  # root権限で実行
  become: yes

  # 実行タスク一覧
  tasks:

    # gradlewファイルに実行権限を付与
    - name: Make gradlew executable

      # fileモジュールを使用
      # ファイルの属性（権限など）を変更する
      file:

        # 対象ファイルパス
        path: /home/ec2-user/aws-study/gradlew

        # パーミッション設定
        # 0755 = 所有者:読み書き実行 / 他ユーザー:読み実行
        mode: '0755'