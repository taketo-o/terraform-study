name: Terraform + SpringBoot CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*.yml'
      - '**/*.tf'
      - 'tests/**/*.hcl'
      - 'ansible/**'

  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '**/*.tf'
      - 'tests/**/*.hcl'
      - 'ansible/**'

  workflow_dispatch:    

permissions:
  contents: read
  id-token: write

jobs:

  terraform-ci:
    name: Terraform CI (Validate & Plan)
    runs-on: ubuntu-latest 

    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
      TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
      TF_VAR_ssh_private_key_path: /tmp/dummy.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1 

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Show Plan
        run: terraform show tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  deploy:
    name: Deploy to AWS (Production)
    runs-on: ubuntu-latest

    needs: terraform-ci

    if: github.ref == 'refs/heads/main'

    environment:
      name: ci-cd

    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
      TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
      TF_VAR_ssh_private_key_path: /tmp/dummy.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Create SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Get EC2 Public IP
        id: tf-output
        run: |
          echo "ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Create Ansible Inventory
        run: |
          mkdir -p ansible

          cat <<EOF > ansible/inventory.ini
          [web]
          ${{ steps.tf-output.outputs.ip }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/key.pem
          EOF

      - name: Show Inventory
        run: cat ansible/inventory.ini

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Run Ansible Playbooks
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False \
          ansible-playbook \
          -i ansible/inventory.ini \
          ansible/import_playbook.yml