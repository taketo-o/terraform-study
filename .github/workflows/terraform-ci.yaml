name: Terraform + SpringBoot CI/CD

on:
  push:
    paths:
      - '.github/workflows/terraform-*.yaml'
      - 'TERRAFORM/**.tf'
      - 'TERRAFORM/tests/**.tftest.hcl'
      - 'TERRAFORM/tests/setup/**.tf'

  pull_request:
    paths:
      - '.github/workflows/terraform-*.yaml'
      - 'TERRAFORM/**.tf'
      - 'TERRAFORM/tests/**.tftest.hcl'
      - 'TERRAFORM/tests/setup/**.tf'

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws-region: ap-northeast-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs:
      - terraform
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}

      - name: Deploy Spring Boot Artifact
        run: echo "EC2 deployment step (SSH/S3/CodeDeploy later)"

