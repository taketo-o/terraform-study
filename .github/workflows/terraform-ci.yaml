name: Terraform + SpringBoot CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/terraform-*.yaml'
      - 'TERRAFORM/**.tf'
      - 'TERRAFORM/tests/**.tftest.hcl'
      - 'TERRAFORM/tests/setup/**.tf'

  pull_request:
    paths:
      - '.github/workflows/terraform-*.yaml'
      - 'TERRAFORM/**.tf'
      - 'TERRAFORM/tests/**.tftest.hcl'
      - 'TERRAFORM/tests/setup/**.tf'

permissions:
  contents: read
  id-token: write 

jobs:

  terraform-ci:
    name: Terraform CI (Validate & Plan)
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
      TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Show Plan (for logs)
        run: terraform show tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


  deploy:
    name: Deploy to AWS (Production)
    runs-on: ubuntu-latest
    needs: terraform-ci

    if: github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply tfplan